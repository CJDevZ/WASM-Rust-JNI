syntax = "proto3";
option java_multiple_files = true;

package eu.cj4.wasm.bindings.protobuf.core.player;
import "core.proto";
import "google/protobuf/any.proto";

message TextComponent {
  int32 message_type = 1;
  string message = 2;
}

message SendMessageCommand {
  TextComponent text = 1;
  bool action_bar = 2;
}

message GiveItemCommand {
  string item = 1;
  int32 count = 2;
}

message CustomCommand {
  int32 command = 1;
  bytes message = 2;
}

message PlayerCommand {
  oneof action {
    GiveItemCommand give_item = 1;
    SendMessageCommand send_message = 2;
    CustomCommand custom_command = 3;
  }
}

message PlayerChange {
  uint64 universal_id = 1;
  optional core.Vec3 position = 2;
  repeated PlayerCommand commands = 3;
}
