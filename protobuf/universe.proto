syntax = "proto3";
option java_multiple_files = true;

package eu.cj4.wasm.bindings.protobuf.core;
import "core.proto";
import "player.proto";

message BlockUpdate {
  uint64 position = 1;
  int32 block = 2;
}

message LevelChange {
  uint64 universal_id = 1;
  repeated BlockUpdate block_updates = 2;
}

message UniverseChanges {
  repeated player.PlayerChange player_changes = 1;
  repeated LevelChange level_changes = 2;
}
